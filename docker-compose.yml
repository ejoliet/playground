version: '3.8'

services:
  # Papyrus DMS Application
  papyrus-dms:
    image: caltechipac/papyrus:latest
    container_name: papyrus-dms
    restart: unless-stopped
    ports:
      - "8080:8080"  # Internal port mapping
    environment:
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:1222}
      - APP_PORT=8080
      - APP_HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/papyrus.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./papyrus-data:/app/data
      - ./papyrus-uploads:/app/uploads
      - ./papyrus-config:/app/config
    networks:
      - dms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "1222:1222"  # Expose on port 1222 as requested
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - papyrus-dms
    networks:
      - dms-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dms-network:
    driver: bridge

volumes:
  papyrus-data:
  papyrus-uploads:
